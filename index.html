<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">


    <title>PA#2</title>
    <style>
        body {
            background-color: #EEEEEE;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .controls {
            background: #fff;
            padding: 15px;
            min-width: 250px;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .control-group input[type="text"] {
            width: 100%;
            box-sizing: border-box;
        }

        #videoElement {
            display: none;
        }
    </style>

    <script src="./Utils/trackball-rotator.js"></script>
    <script src="./Utils/m4.js"></script>
    <script src="./shader.js"></script>
    <script src="./Model.js"></script>
    <script src="./StereoCamera.js"></script>
    <script src="./main.js"></script>

</head>
<body onload="init()">

<h2>PA#2: Tangible Interface (Magnetometer, Variant 8)</h2>

<p id="message">Use trackball with mouse, or connect phone magnetometer for compass-like yaw rotation.</p>

<div class="container">
    <div id="canvas-holder">
        <canvas width="600" height="600" id="webglcanvas" style="background-color:black"></canvas>
    </div>

    <div class="controls">
        <h3>Stereo Parameters</h3>

        <div class="control-group">
            <label>Eye Separation: <span id="eyeSeparationValue">0.7</span></label>
            <input type="range" id="eyeSeparation" min="0.1" max="2.0" value="0.7" step="0.1">
        </div>

        <div class="control-group">
            <label>FOV: <span id="fieldOfViewValue">23</span>°</label>
            <input type="range" id="fieldOfView" min="5" max="90" value="23" step="1">
        </div>

        <div class="control-group">
            <label>Near Clip: <span id="nearClippingValue">8</span></label>
            <input type="range" id="nearClipping" min="1" max="15" value="8" step="0.5">
        </div>

        <div class="control-group">
            <label>Convergence: <span id="convergenceValue">14</span></label>
            <input type="range" id="convergence" min="1" max="30" value="14" step="0.5">
        </div>

        <h3>Webcam</h3>
        <button id="startCamera" onclick="startWebcam()">Start</button>
        <button id="stopCamera" onclick="stopWebcam()" disabled>Stop</button>

        <h3>Phone Sensor (WebSocket)</h3>
        <div class="control-group">
            <label for="sensorWsUrl">WS URL</label>
            <input type="text" id="sensorWsUrl" value="ws://192.168.0.100:8080" placeholder="ws://phone-or-bridge:port">
        </div>
        <div class="control-group">
            <button id="connectSensor" onclick="connectSensor()">Connect</button>
            <button id="disconnectSensor" onclick="disconnectSensor()" disabled>Disconnect</button>
        </div>
        <div class="control-group">
            <div>Status: <span id="sensorStatus">Disconnected</span></div>
            <div>Rotation mode: <span id="rotationMode">Trackball</span></div>
            <div>Heading: <span id="sensorHeading">-</span> deg</div>
        </div>
    </div>
</div>

<video id="videoElement" autoplay playsinline></video>

</body>
</html>
