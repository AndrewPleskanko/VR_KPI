<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Control Task: AR.js</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('pa1-surface', {
            init: function () {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                const indices = [];

                function deg2rad(angle) {
                    return angle * Math.PI / 180;
                }

                let points = [];
                for (let i = 0, ang = 0; i < 72; i++, ang += 5) {
                    points.push([Math.sin(deg2rad(ang)), 0, Math.cos(deg2rad(ang))]);
                }
                for (let i = 0, ang = 0; i < 72; i++, ang += 5) {
                    points.push([Math.sin(deg2rad(ang)), 1, Math.cos(deg2rad(ang))]);
                }

                for (let i = 0; i < points.length; i++) {
                    vertices.push(points[i][0], points[i][1], points[i][2]);
                }

                for (let i = 0; i < 72; i++) {
                    if (i > 0) {
                        let v0 = i + 72;
                        let v1 = v0 - 72 - 1;
                        let v2 = v0 - 1;
                        let v3 = v0 - 72;

                        indices.push(v0, v1, v2);
                        indices.push(v0, v3, v1);
                    }
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshNormalMaterial({wireframe: true});
                const mesh = new THREE.Mesh(geometry, material);

                this.el.setObject3D('mesh', mesh);
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker type="pattern" url="pattern-marker.patt">

        <a-entity pa1-surface position="0 0 0" scale="1.5 1.5 1.5"></a-entity>

    </a-marker>

    <a-entity camera></a-entity>
</a-scene>
</body>
</html>
