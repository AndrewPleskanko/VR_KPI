<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Control Task: AR.js</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('pa1-surface', {
            init: function () {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                const indices = [];

                function deg2rad(a) {
                    return a * Math.PI / 180;
                }

                for (let i = 0; i < 72; i++) {
                    const ang = i * 5;
                    vertices.push(
                        Math.sin(deg2rad(ang)),
                        0,
                        Math.cos(deg2rad(ang))
                    );
                }
                for (let i = 0; i < 72; i++) {
                    const ang = i * 5;
                    vertices.push(
                        Math.sin(deg2rad(ang)),
                        1,
                        Math.cos(deg2rad(ang))
                    );
                }

                for (let i = 0; i < 72; i++) {
                    const next = (i + 1) % 72;

                    const v0 = i;
                    const v1 = next;
                    const v2 = 72 + i;
                    const v3 = 72 + next;

                    indices.push(v0, v1, v2);
                    indices.push(v1, v3, v2);
                }

                geometry.setAttribute(
                    'position',
                    new THREE.Float32BufferAttribute(vertices, 3)
                );
                geometry.setIndex(indices);
                geometry.computeVertexNormals();

                const material = new THREE.MeshNormalMaterial({
                    side: THREE.DoubleSide,
                    wireframe: false
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.scale.set(0.5, 0.5, 0.5);

                this.el.setObject3D('mesh', mesh);
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
<a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-marker type="pattern" url="pattern-marker.patt" smooth="true" smoothCount="5">
        <a-entity pa1-surface position="0 0 0"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>
</body>
</html>
